version: '3.9'

services:
  backend:
    build:
      context: ./backend/TVTracker
      dockerfile: Dockerfile
    container_name: tvtracker-api
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:5000

      # 🔥 USE RENDER DATABASE HERE
      - ConnectionStrings__DefaultConnection=Host=dpg-d6t11b7afjfc73fk2md0-a.oregon-postgres.render.com;Port=5432;Database=tvtracker_db;Username=tvtracker_db_user;Password=0GX11V1cejSr0JgFlsepT9JO5dBszLWS;SSL Mode=Require;Trust Server Certificate=true

      - JwtSettings__SecretKey=super-secret-jwt-key-at-least-32-characters-long-for-production!
      - JwtSettings__Issuer=tvtracker
      - JwtSettings__Audience=tvtracker-users

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: tvtracker-ui
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - backend

