version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: tvtracker-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: tvtracker123
      POSTGRES_DB: tvtracker
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./postgres-init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d tvtracker"]
      interval: 3s
      timeout: 5s
      retries: 20
      start_period: 15s

  backend:
    build: ./backend/TVTracker
    container_name: tvtracker-api
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__DefaultConnection=Host=postgres;Port=5432;Database=tvtracker;Username=postgres;Password=tvtracker123
    volumes:
      - ./backend/TVTracker:/app  # 🔥 Syncs your C# code
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build: ./frontend
    container_name: tvtracker-ui
    dns:
      - 8.8.8.8
      - 8.8.4.4
    # ... rest of your config
    restart: unless-stopped
    ports:
      - "3000:3000" # 🔥 Changed to 3000 for the Node dev server
    volumes:
      - ./frontend:/app        # 🔥 Syncs your JS/TS code
      - /app/node_modules     # Keeps container modules safe
    depends_on:
      - backend
volumes:
  pgdata: