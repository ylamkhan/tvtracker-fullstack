version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: tvtracker-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: tvtracker123
      POSTGRES_DB: tvtracker
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./postgres-init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d tvtracker"]
      interval: 3s
      timeout: 5s
      retries: 20
      start_period: 15s

  backend:
    image: mcr.microsoft.com/dotnet/sdk:8.0
    container_name: tvtracker-api
    working_dir: /app
    volumes:
      - ./backend/TVTracker:/app
    command: >
      bash -c "dotnet restore &&
              dotnet watch run --urls=http://0.0.0.0:5000"
    ports:
      - "5000:5000"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__DefaultConnection=Host=postgres;Port=5432;Database=tvtracker;Username=postgres;Password=tvtracker123
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    image: node:20
    container_name: tvtracker-ui
    working_dir: /app
    volumes:
      - ./frontend:/app   # 🔥 sync code
    command: >
      bash -c "npm install && npm run dev -- --host"
    ports:
      - "3000:5173"   # Vite default
    depends_on:
      - backend

volumes:
  pgdata: