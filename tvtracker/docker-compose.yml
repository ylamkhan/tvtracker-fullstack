version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: tvtracker-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: tvtracker123
      POSTGRES_DB: tvtracker
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./postgres-init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d tvtracker"]
      interval: 3s
      timeout: 5s
      retries: 20
      start_period: 15s

  backend:
    build:
      context: ./backend/TVTracker
      dockerfile: Dockerfile
    container_name: tvtracker-api
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:5000
      - ConnectionStrings__DefaultConnection=Host=postgres;Port=5432;Database=tvtracker;Username=postgres;Password=tvtracker123
      - JwtSettings__SecretKey=super-secret-jwt-key-at-least-32-characters-long-for-production!
      - JwtSettings__Issuer=tvtracker
      - JwtSettings__Audience=tvtracker-users
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: tvtracker-ui
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  pgdata:
